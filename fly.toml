app = "foundry-slag"
primary_region = "ord"

[build]

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 3458
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  source = "slag_data"
  destination = "/app/backend/.runtime"
